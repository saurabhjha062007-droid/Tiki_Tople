<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiki Race: Tech Titans</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; font-family: sans-serif; margin: 0; padding-bottom: 50px; overflow-x: hidden; }

        /* --- OPENING ANIMATION --- */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 5000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: opacity 1.5s ease-out;
        }
        .glitch {
            font-size: 3.5rem; font-weight: bold; text-transform: uppercase;
            letter-spacing: 5px; color: #00e5ff; text-shadow: 0 0 20px #00e5ff;
            animation: glitch-anim 2s infinite;
        }
        @keyframes glitch-anim {
            0% { transform: skew(0deg); }
            20% { transform: skew(-3deg); text-shadow: 2px 0 red; }
            40% { transform: skew(3deg); text-shadow: -2px 0 blue; }
            60% { transform: skew(0deg); }
        }

        /* --- MENUS --- */
        #setup-menu, #mode-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .menu-btn { padding: 15px 40px; margin: 10px; font-size: 1.2rem; cursor: pointer; background: #cc5500; color: white; border: none; border-radius: 8px; font-weight: bold; }

        /* --- UI --- */
        .player-ui { position: absolute; display: none; flex-direction: column; gap: 5px; z-index: 1000; width: 320px; transition: opacity 0.3s; }
        .player-ui.inactive { opacity: 0.2; pointer-events: none; filter: grayscale(1); }
        #ui-0 { top: 10px; left: 10px; align-items: flex-start; }
        #ui-1 { top: 10px; right: 10px; align-items: flex-end; }
        #ui-2 { bottom: 120px; left: 10px; align-items: flex-start; }
        #ui-3 { bottom: 120px; right: 10px; align-items: flex-end; }

        .player-box { width: 140px; height: 35px; border: 3px solid white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; text-transform: uppercase; margin-bottom: 5px;}
        
        /* Mission Rows with Colors */
        .secret-card-display { font-size: 0.75rem; background: #222; padding: 8px; border: 2px solid gold; border-radius: 5px; margin-bottom: 5px; line-height: 1.4; color: #fff; width: 180px; }
        .mission-row { display: flex; justify-content: space-between; padding: 3px 8px; margin: 2px 0; border-radius: 4px; font-weight: bold; text-shadow: 1px 1px 2px black; border: 1px solid rgba(255,255,255,0.1); }

        .card-dock { display: flex; gap: 4px; padding: 5px; border-radius: 8px; background: rgba(255,255,255,0.05); min-height: 65px; }
        .card { width: 40px; height: 60px; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 7px; font-weight: bold; color: white; border: 2px solid white; transition: 0.3s; text-align: center;}
        .card.selected { outline: 4px solid gold; transform: scale(1.1); box-shadow: 0 0 15px gold; }

        .game-board { position: relative; width: 550px; height: 850px; background: linear-gradient(to bottom, #1b5e20 20%, #4caf50 40%, #fbc02d 70%, #0288d1 100%); border: 12px solid #261405; border-radius: 15px; margin-top: 50px; }
        .bridge { position: absolute; left: 50%; transform: translateX(-50%); width: 85px; height: 80%; bottom: 0; display: flex; flex-direction: column; background: #4e342e; border: 4px solid #261405; z-index: 5; }
        .slot { position: relative; flex: 1; border-bottom: 2px solid #261405; display: flex; justify-content: center; align-items: center; }
        .tiki-piece { width: 34px; height: 42px; border-radius: 4px; border: 1px solid #000; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 7px; font-weight: bold; color: white; text-shadow: 1px 1px 1px black; }
        
        .step { position: absolute; width: 50px; height: 40px; background: #cfd8dc; border-radius: 40% 60% 50% 45%; display: flex; justify-content: center; align-items: center; color: #263238; font-weight: bold; font-size: 11px; z-index: 6; }
        .piece { width: 18px; height: 18px; border-radius: 50%; border: 2px solid white; transition: all 0.5s; margin: 1px; }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 4000; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="glitch">TECH TITANS</div>
        <div class="subtitle">INITIALIZING SYSTEM...</div>
    </div>

    <div id="mode-menu">
        <h1 style="color:white; letter-spacing:4px">CHOOSE MODE</h1>
        <button class="menu-btn" onclick="showPlayerSetup(false)">PASS & PLAY</button>
        <button class="menu-btn" onclick="showPlayerSetup(true)">VS COMPUTER</button>
    </div>

    <div id="setup-menu">
        <h1 id="setup-title" style="color:white; letter-spacing:4px">SELECT PLAYERS</h1>
        <div id="player-btns"></div>
    </div>

    <div id="overlay">
        <h1 id="overlay-title" style="color:#ffeb3b; font-size:3rem">ROUND OVER</h1>
        <div id="overlay-content" style="color:white; font-size:1.5rem; margin:20px"></div>
        <button class="menu-btn" onclick="startNewRound()">NEXT ROUND</button>
    </div>

    <div id="victory-text" style="font-size: 1.5rem; color: #ffeb3b; margin: 10px; height: 35px;"></div>

    <div class="player-ui" id="ui-0"><div class="player-box" style="border-color:#ff4444; background:#4d0000">Player 1</div><div class="secret-card-display" id="secret-0"></div><div class="card-dock" id="dock-0"></div></div>
    <div class="player-ui" id="ui-1"><div class="player-box" style="border-color:#4444ff; background:#00004d">Player 2</div><div class="secret-card-display" id="secret-1"></div><div class="card-dock" id="dock-1"></div></div>
    <div class="player-ui" id="ui-2"><div class="player-box" style="border-color:#44ff44; background:#003300">Player 3</div><div class="secret-card-display" id="secret-2"></div><div class="card-dock" id="dock-2"></div></div>
    <div class="player-ui" id="ui-3"><div class="player-box" style="border-color:#ffff44; background:#4d4d00">Player 4</div><div class="secret-card-display" id="secret-3"></div><div class="card-dock" id="dock-3"></div></div>

    <div class="game-board">
        <div class="bridge" id="bridge"></div>
        <div id="path-container"></div>
    </div>

    <div class="yard" id="yard" style="margin-top: 20px; width: 600px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;"></div>

    <script>
        const tikiData = [
            { n: 'Hookipa', c: '#808080' }, { n: 'Lokahi', c: '#800080' }, { n: 'Nani', c: '#e74c3c' },
            { n: 'Wikiwiki', c: '#3498db' }, { n: 'Akamai', c: '#e67e22' }, { n: 'Huhu', c: '#f1c40f' },
            { n: 'Kapu', c: '#ffc0cb' }, { n: 'Eepo', c: '#795548' }, { n: 'Maui', c: '#2ecc71' }
        ];
        const cardDefs = [
            {t:'TIKI UP', v:'1', type:'up'}, {t:'TIKI UP', v:'1', type:'up'}, {t:'TIKI UP', v:'2', type:'up'}, 
            {t:'TIKI UP', v:'3', type:'up'}, {t:'TOPPLE', v:'↓', type:'topple'}, {t:'TOAST', v:'X', type:'toast'}, {t:'TOAST', v:'X', type:'toast'}
        ];

        let totalPlayers, currentTurn, isSetupPhase, selectedCard, isRoundActive, vsComputer;
        let playerStatus = []; 
        let playerMissions = [];

        window.onload = () => {
            initBoard();
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('mode-menu').style.display = 'flex';
            }, 2500);
        };

        function initBoard() {
            const p = document.getElementById('path-container');
            for(let i=0; i<=35; i++){
                const s = document.createElement('div');
                s.className = 'step'; s.dataset.step = i;
                if (i === 0) { s.style.bottom = "5%"; s.style.left = "12%"; s.innerHTML = "S"; s.style.width="100px"; }
                else if (i < 16) { s.style.bottom = (5 + i*6) + "%"; s.style.left = (12 + Math.sin(i)*8) + "%"; s.innerText = i; }
                else if (i < 21) { s.style.top = "2%"; s.style.left = (20 + (i-15)*15) + "%"; s.innerText = i; }
                else { let rI = i-21; s.style.top = (10 + rI*6) + "%"; s.style.right = (10 + Math.sin(rI)*8) + "%"; s.innerText = i; }
                p.appendChild(s);
            }
            const b = document.getElementById('bridge');
            for(let i=1; i<=9; i++) {
                const s = document.createElement('div');
                s.className = 'slot'; s.dataset.rank = i;
                b.appendChild(s);
            }
        }

        function showPlayerSetup(compMode) {
            vsComputer = compMode;
            document.getElementById('mode-menu').style.display = 'none';
            document.getElementById('setup-menu').style.display = 'flex';
            const container = document.getElementById('player-btns');
            container.innerHTML = '';
            [2,3,4].forEach(n => {
                const btn = document.createElement('button');
                btn.className = 'menu-btn';
                btn.innerText = `${n} PLAYERS`;
                btn.onclick = () => initGame(n);
                container.appendChild(btn);
            });
        }

        function initGame(num) {
            totalPlayers = num;
            document.getElementById('setup-menu').style.display = 'none';
            for(let i=0; i<num; i++) {
                document.getElementById(`ui-${i}`).style.display = 'flex';
                const pBox = document.querySelectorAll('.player-box')[i];
                if(vsComputer && i > 0) pBox.innerText = `CPU ${i}`;
                const t = document.createElement('div');
                t.className = 'piece'; t.style.backgroundColor = pBox.style.borderColor;
                document.querySelector(`[data-step="0"]`).appendChild(t);
                playerStatus[i] = { pos: 0, token: t, isCPU: (vsComputer && i > 0) };
            }
            startNewRound();
        }

        function startNewRound() {
            document.getElementById('overlay').style.display = 'none';
            isRoundActive = true; isSetupPhase = true; currentTurn = 0;
            document.getElementById('yard').innerHTML = '';
            tikiData.forEach(d => {
                const t = document.createElement('div');
                t.className = 'tiki-piece'; t.style.backgroundColor = d.c;
                t.innerText = d.n; t.dataset.name = d.n;
                t.onclick = () => handleAction(t);
                document.getElementById('yard').appendChild(t);
            });
            document.querySelectorAll('.slot').forEach(s => { if(s.querySelector('.tiki-piece')) s.querySelector('.tiki-piece').remove(); });
            
            for(let i=0; i<totalPlayers; i++) {
                let shuf = [...tikiData].sort(() => Math.random() - 0.5);
                playerMissions[i] = shuf.slice(0, 3);
                let missionHTML = `<b>MISSION CARD</b>`;
                playerMissions[i].forEach((m, idx) => {
                    missionHTML += `<div class="mission-row" style="background:${m.c}">${idx+1}: ${m.n}</div>`;
                });
                document.getElementById(`secret-${i}`).innerHTML = missionHTML;
                
                const dock = document.getElementById(`dock-${i}`);
                dock.innerHTML = '';
                cardDefs.forEach(cd => {
                    const c = document.createElement('div');
                    c.className = 'card'; c.style.backgroundColor = document.querySelectorAll('.player-box')[i].style.borderColor;
                    c.innerHTML = `<div>${cd.t}</div><div>${cd.v}</div>`;
                    c.onclick = () => { if(!playerStatus[i].isCPU) selectCard(c, cd, i); };
                    dock.appendChild(c);
                });
            }
            document.getElementById('victory-text').innerText = "PHASE 1: ASSEMBLE BRIDGE";
            if(playerStatus[0].isCPU) runCPUTurn(); 
        }

        function selectCard(cardEl, def, pIdx) {
            if(isSetupPhase || !isRoundActive || currentTurn !== pIdx) return;
            if(selectedCard) selectedCard.classList.remove('selected');
            selectedCard = cardEl; selectedCard.classList.add('selected');
            selectedCard.dataset.type = def.type; selectedCard.dataset.val = def.v;
        }

        function handleAction(tiki) {
            if(!isRoundActive) return;
            const slots = Array.from(document.querySelectorAll('.slot'));

            if(isSetupPhase) {
                const empty = slots.find(s => !s.querySelector('.tiki-piece'));
                if(empty) {
                    empty.appendChild(tiki);
                    if(document.querySelectorAll('.bridge .tiki-piece').length === 9) {
                        isSetupPhase = false;
                        updateTurnUI();
                    }
                }
                return;
            }

            if(!selectedCard) return;
            let bridgeTikis = slots.map(s => s.querySelector('.tiki-piece'));
            const idx = bridgeTikis.indexOf(tiki);
            if(idx === -1) return;

            const type = selectedCard.dataset.type;
            const val = selectedCard.dataset.val;

            if(type === 'up') {
                let target = (idx === 0) ? 1 : Math.max(0, idx - parseInt(val));
                bridgeTikis.splice(idx, 1); bridgeTikis.splice(target, 0, tiki);
            } else if(type === 'topple') {
                const count = bridgeTikis.filter(t => t !== null).length;
                bridgeTikis.splice(idx, 1); bridgeTikis.splice(count - 1, 0, tiki);
            } else if(type === 'toast') {
                document.getElementById('yard').appendChild(tiki);
                bridgeTikis.splice(idx, 1);
            }

            slots.forEach((s, i) => {
                s.innerHTML = '';
                if(bridgeTikis[i]) s.appendChild(bridgeTikis[i]);
            });

            selectedCard.remove(); selectedCard = null;
            checkRoundEnd();
        }

        function checkRoundEnd() {
            const left = document.querySelectorAll('.bridge .tiki-piece').length;
            const limit = (totalPlayers === 2) ? 5 : 3;
            let noCards = true;
            document.querySelectorAll('.card-dock').forEach(d => { if(d.children.length > 0) noCards = false; });

            if(left <= limit || noCards) endRound();
            else {
                currentTurn = (currentTurn + 1) % totalPlayers;
                updateTurnUI();
                if(playerStatus[currentTurn].isCPU) setTimeout(runCPUTurn, 1000);
            }
        }

        function runCPUTurn() {
            if(!isRoundActive) return;
            
            // Phase 1: Setup
            if(isSetupPhase) {
                const yardTikis = document.getElementById('yard').querySelectorAll('.tiki-piece');
                if(yardTikis.length > 0) {
                    handleAction(yardTikis[Math.floor(Math.random() * yardTikis.length)]);
                    setTimeout(runCPUTurn, 500);
                }
                return;
            }

            // Phase 2: Playing Cards
            const dock = document.getElementById(`dock-${currentTurn}`);
            const cards = dock.querySelectorAll('.card');
            if(cards.length > 0) {
                const randomCard = cards[Math.floor(Math.random() * cards.length)];
                // Find card def
                const type = randomCard.innerText.includes("UP") ? "up" : randomCard.innerText.includes("TOPPLE") ? "topple" : "toast";
                const val = randomCard.innerText.split("\n")[1];
                
                selectedCard = randomCard;
                selectedCard.dataset.type = type;
                selectedCard.dataset.val = val;

                const bridgeTikis = document.querySelectorAll('.bridge .tiki-piece');
                const randomTiki = bridgeTikis[Math.floor(Math.random() * bridgeTikis.length)];
                setTimeout(() => handleAction(randomTiki), 800);
            }
        }

        async function endRound() {
            isRoundActive = false;
            const slots = document.querySelectorAll('.slot');
            const top3 = [ slots[0].querySelector('.tiki-piece')?.dataset.name, slots[1].querySelector('.tiki-piece')?.dataset.name, slots[2].querySelector('.tiki-piece')?.dataset.name ];
            let summary = "";

            for(let i=0; i<totalPlayers; i++) {
                let pts = 0;
                if(top3[0] === playerMissions[i][0].n) pts += 9;
                if(top3[1] === playerMissions[i][1].n) pts += 5;
                if(top3[2] === playerMissions[i][2].n) pts += 2;
                summary += `${(vsComputer && i>0) ? 'CPU '+i : 'Player '+(i+1)}: +${pts} pts<br>`;
                for(let p=0; p<pts; p++) {
                    if(playerStatus[i].pos < 35) {
                        playerStatus[i].pos++;
                        document.querySelector(`[data-step="${playerStatus[i].pos}"]`).appendChild(playerStatus[i].token);
                        if(playerStatus[i].pos === 35) {
                            alert("WINNER: " + ((vsComputer && i>0) ? 'CPU '+i : 'Player '+(i+1)));
                            location.reload();
                        }
                        await new Promise(r => setTimeout(r, 100));
                    }
                }
            }
            document.getElementById('overlay-content').innerHTML = summary;
            document.getElementById('overlay').style.display = 'flex';
        }

        function updateTurnUI() {
            document.getElementById('victory-text').innerText = `${playerStatus[currentTurn].isCPU ? 'CPU ' + currentTurn : 'Player ' + (currentTurn + 1)}'s Turn`;
            document.querySelectorAll('.player-ui').forEach((ui, i) => ui.classList.toggle('inactive', i !== currentTurn));
        }
    </script>
</body>
</html>
